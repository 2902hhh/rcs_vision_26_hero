#####-----MPC Planner 参数-----#####
# 允许的最大角加速度 (rad/s^2)
max_yaw_acc: 200.0
max_pitch_acc: 100.0

# 状态权重矩阵 Q [pos_weight, vel_weight]
# 越大越强行跟踪目标
Q_yaw: [2000.0, 10.0]
Q_pitch: [2000.0, 10.0]

# 控制权重矩阵 R [acc_weight]
# 越小响应越快，但也越容易震荡
R_yaw: [0.01]
R_pitch: [0.01]

# 允许开火的追踪误差阈值 (rad)
fire_thresh: 0.01

