#enemy_color: "red"
enemy_color: "blue"


#####-----神经网络参数-----#####
yolo_name: yolov5
classify_model: assets/tiny_resnet.onnx
yolo11_model_path: assets/yolo11.xml
yolov8_model_path: assets/yolov8.xml
yolov5_model_path: assets/0526.onnx
device: CPU
min_confidence: 0.8
use_traditional: true

#####-----ROI-----#####
roi: 
  x: 420
  y: 50
  width: 600
  height: 600

use_roi: false

#####-----USB相机参数-----#####
image_width: 1280
image_height: 720
fov_h: 57.7 #87.7
fov_v: 56.7 
new_fov_h: 27 #67
new_fov_v: 40.9
usb_frame_rate: 120
usb_exposure: 500 #1-80000______250
usb_gamma: 160
usb_gain: 10 #0-96

#####-----工业相机参数-----#####
camera_name: "hikrobot"
exposure_ms: 6
gain: 12.0
vid_pid: "2bdf:0001"

#####-----传统方法参数-----#####
threshold: 150
max_angle_error: 45 # degree
min_lightbar_ratio: 1.5
max_lightbar_ratio: 20
min_lightbar_length: 8
min_armor_ratio: 1
max_armor_ratio: 5
max_side_ratio: 1.5
max_rectangular_error: 25 # degree
min_confidence: 0.8

#####-----cboard参数-----#####
quaternion_canid: 0x01
bullet_speed_canid: 0x110
send_canid: 0xff
can_interface: "can0"



#####-----gimbal参数-----#####
com_port: "/dev/gimbal"
serial_baudrate: 460800

#####-----tracker参数-----#####
min_detect_count: 5
max_temp_lost_count: 75
outpost_max_temp_lost_count: 300

#####-----aimer参数-----#####
yaw_offset: 1.8 # degree -2.5 正左
pitch_offset: -1.2  # degree 2 正上
comming_angle: 120 # degree
leaving_angle: 5 # degree
left_yaw_offset: -1
right_yaw_offset: -0.6
decision_speed: 2  # rad/s
high_speed_delay_time: 0.020 # s
low_speed_delay_time: 0.020 # s

#####-----小陀螺策略参数-----#####
# 可选策略: "preview" / "coming_leaving" / "adaptive"
# preview: 预瞄模式，云台提前指向装甲板即将出现的位置（守株待兔）
# coming_leaving: 根据旋转方向选择coming/leaving的装甲板
# adaptive: 根据转速和角度自动选择最优策略
spin_strategy: "adaptive"
static_track_face_angle: 15  # 预瞄追踪角度，degree
max_stability_track_rotate_speed: 0.0  # 云台最大稳定追踪角速度，rad/s
use_manual_rotate_speed: true  # 是否绕过观测角速度 true false
manual_rotate_speed: 2.513        # 手动角速度(rad/s)，正负表示旋转方向
spin_enter_speed: 2.4           # 进入小陀螺策略阈值(rad/s)
spin_exit_speed: 1.8            # 退出小陀螺策略阈值(rad/s)
spin_speed_lpf_alpha: 0.25      # 转速低通滤波系数(0~1)

#####-----shooter参数-----#####
first_tolerance: 1.0 # 近距离射击容差，degree
second_tolerance: 1.3 # 远距离射击容差，degree
judge_distance: 3 #距离判断阈值
auto_fire: true # 是否由自瞄控制射击
fire_cooldown: 0.0 # 开火静默时间，s
fire_cooldown_arm_delay: 0.5 # 开火后延迟触发静默，s

#####-----decider参数-----#####
mode: 1

#####-----工业相机标定参数-----#####
R_gimbal2imubody: [1, 0, 0, 0, 1, 0, 0, 0, 1]

